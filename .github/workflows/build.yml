name: Build

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      # ── Backend (core) ──
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: cargo build
        env:
          SQLX_OFFLINE: "true"
        run: cargo build --release --bin kubuno-core --bin kubuno

      # ── Frontend host ──
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: build frontend host
        working-directory: frontend
        run: |
          npm ci
          npm run build

      # ── Paquet Debian ──
      - name: build .deb
        run: bash build_deb.sh
      - uses: actions/upload-artifact@v4
        with:
          name: kubuno-core-deb
          path: dist/*.deb

      # ── Release (sur tag v*) ──
      - name: release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.deb
